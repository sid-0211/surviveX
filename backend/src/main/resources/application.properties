spring.application.name=surviveX
server.address=0.0.0.0
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/survivex?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:survivex}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:survivex}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.error.include-message=always
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
elevenlabs.api-key=${ELEVENLABS_API_KEY:}
elevenlabs.voice-id=${ELEVENLABS_VOICE_ID:JBFqnCBsd6RMkjVDRZzb}
elevenlabs.model-id=${ELEVENLABS_MODEL_ID:eleven_multilingual_v2}
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
